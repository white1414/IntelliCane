<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>IntelliCane</title>
    <!--
      Load TensorFlow.js + TFLite as classic UMD scripts from /tflite-wasm/.
      Order matters: tf-core defines window.tf, each backend registers
      itself onto window.tf, then tf-tflite hangs window.tflite off it.

      We deliberately do NOT bundle "@tensorflow/tfjs-tflite" through
      Vite/Rollup. The package's internal loader resolves
      `tflite_web_api_client.js` against `import.meta.url` of the SOURCE
      file in node_modules — the bundler bakes that absolute dev URL into
      the production output, which 404s inside the Capacitor APK and
      causes a white-screen on launch.

      Backend priority (set in yolo.ts selectBestBackend):
        1. webgpu — GPU via WebGPU API (Chromium 113+). Fastest.
        2. webgl  — GPU via WebGL2. Available on virtually all Android.
        3. wasm   — CPU via WASM (with SIMD if supported).
        4. cpu    — pure JS fallback. Slowest.
    -->
    <script src="./tflite-wasm/tf-core.min.js"></script>
    <script src="./tflite-wasm/tf-backend-webgl.min.js"></script>
    <script src="./tflite-wasm/tf-backend-wasm.min.js"></script>
    <script src="./tflite-wasm/tf-tflite.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
