<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>IntelliCane</title>
    <!--
      Load the tfjs-tflite runtime via a classic <script> from /tflite-wasm/.
      This MUST come before the module bundle so window.tflite is defined by
      the time yolo.ts touches it. We deliberately do NOT import
      "@tensorflow/tfjs-tflite" as an ES module anywhere — bundlers bake the
      original node_modules URL into the build, which breaks inside the
      Capacitor APK (no node_modules at runtime → SPA fallback → MIME error
      → white screen). The script tag avoids that entirely.
    -->
    <script src="./tflite-wasm/tflite_web_api_client.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
