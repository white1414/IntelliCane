kind = "web"
previewPath = "/"
title = "Smart Cane"
version = "1.0.0"
id = "artifacts/smart-cane"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20410

[services.development]
run = "pnpm --filter @workspace/smart-cane run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-cane", "run", "build" ]
publicDir = "artifacts/smart-cane/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20410"
BASE_PATH = "/"
